services:
  api:
    profiles: ["app"]
    build: .
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://ertis:ertis_dev@postgres:5432/ertis_hr?schema=public
      RABBITMQ_URL: amqp://ertis:ertis_dev@rabbitmq:5672
      OUTBOX_PUBLISHER_ENABLED: "true"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ertis_hr
      POSTGRES_USER: ertis
      POSTGRES_PASSWORD: ertis_dev
    ports:
      - "5433:5432"
    volumes:
      - ertis_hr_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ertis -d ertis_hr"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ertis
      RABBITMQ_DEFAULT_PASS: ertis_dev
    ports:
      - "5673:5672"
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  ertis_hr_postgres:
